<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;padding:16px;background:#fff;color:#111827}
h2{font-size:16px;margin-bottom:12px}
p{font-size:12px;color:#6B7280;margin-bottom:16px}
button{width:100%;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
button:hover{background:#1D4ED8}
button:disabled{background:#9CA3AF;cursor:default}
button.secondary{background:#fff;border:1px solid #E5E7EB;color:#111827}
.status{font-size:11px;color:#6B7280;margin-top:8px;min-height:16px}
.progress{width:100%;height:4px;background:#E5E7EB;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:#2563EB;width:0%;transition:width .3s}
</style></head><body>
<h2>🏫 校园通 · 原型生成器</h2>
<p>点击按钮自动在 Figma 画布中生成 14 个高保真原型屏幕。包含完整的设计系统、导航组件、列表、详情、表单和模态面板。</p>
<button id="generateBtn" onclick="generate()">🎨 生成高保真原型</button>
<button class="secondary" onclick="cancel()">取消</button>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="status" id="status">就绪</div>
<script>
function generate(){
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('status').textContent = '正在生成...';
  parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
}
function cancel(){
  parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
}
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (msg.type === 'progress') {
    document.getElementById('progressBar').style.width = msg.percent + '%';
    document.getElementById('status').textContent = msg.text;
  }
  if (msg.type === 'done') {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('status').textContent = msg.text;
  }
};
</script>
</body></html>
