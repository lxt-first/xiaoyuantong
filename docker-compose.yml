version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xiaoyuantong
      POSTGRES_PASSWORD: xiaoyuantong_dev
      POSTGRES_DB: xiaoyuantong
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaoyuantong"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://xiaoyuantong:xiaoyuantong_dev@postgres:5432/xiaoyuantong
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
